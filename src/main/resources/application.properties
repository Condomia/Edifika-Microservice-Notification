spring.application.name=edifika-notification-service

# Servidor
server.port=${PORT:8082}

# DB Supabase
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.hibernate.naming.physical-strategy=com.edifika.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# JWT mismo secret que IAM
jwt.secret=${JWT_SECRET:edifika-secret-key-must-be-at-least-32-characters-long}
jwt.expiration.days=${JWT_EXPIRATION_DAYS:365}

# Documentacion
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# Firebase Cloud Messaging
firebase.credentials=${FIREBASE_CREDENTIALS:}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase/serviceAccountKey.json}

